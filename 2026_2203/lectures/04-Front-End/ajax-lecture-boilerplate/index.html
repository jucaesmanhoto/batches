<html>
  <head>
    <meta charset="utf-8">

    <title>JavaScript DOM demo</title>

    <link rel="icon" type="image/png" href="images/logo.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.1/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Script para habilitar o uso do ES Module em navegadores antigos
     Só é necessário caso dê algum problema de compatibilidade do importmaps com o seu navegador -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <!-- Script para usar a biblioteca Import-Maps
     DOCUMENTAÇÃO (ctrl + click / cmd + click ) => https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/script/type/importmap -->
    <script type="importmap">
      {
        "imports": {
          "bootstrap": "https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js",
          "sweetalert2": "https://cdn.jsdelivr.net/npm/sweetalert2@11.7.1/+esm"
        }
      }
    </script>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar-lewagon">
      <img src="images/logo.png" alt="logo">
    </div>

    <div class="container">
      <!-- Your code here -->
       <div class="row">
        <div class="col">
          <div class="d-flex justify-content-center mt-5">
            <form action="" id="form">
              <label for="email">Email</label>
              <input type="email" id="email">
              <label for="password">Password</label>
              <input type="password" id="password">
              <input type="submit" value="Sign up">
            </form>
          </div>
        </div>
       </div>

      <p class="my-5 text-center">Open the console 🤓</p>
    </div>

    <!-- Your own JavaScript file -->
    <script src="javascript/application.js" type="module"></script>
  </body>
</html>
